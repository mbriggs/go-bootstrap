name: check

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: go_bootstrap
          POSTGRES_PASSWORD: go_bootstrap
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      PGHOST: localhost
      PGPORT: "5432"
      PGUSER: go_bootstrap
      PGPASSWORD: go_bootstrap
      PGDATABASE: go_bootstrap_dev
      TERN_MIGRATIONS: migrations

    steps:
      - uses: actions/checkout@v4

      - uses: jdx/mise-action@v2

      - name: Create and migrate the dev database
        run: bin/recreate

      - name: Full verification gate
        run: bin/check

      - name: Vulnerability scan
        run: bin/vuln-check
